                <p>1、注册Github账号</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">打开github的官网:https://github.com</span><br><span class="line">点击右上角【SignUp】按钮开始注册</span><br><span class="line">已有github账号可以直接跳过这一步</span><br><span class="line">英语不好的朋友，可以在浏览器右键，选择【翻译成简体中文】</span><br></pre></td></tr></table></figure>
<p><img src="http://wx1.sinaimg.cn/large/cc586804gy1g1zn769yxbj21110iawg3.jpg" alt="01"></p>
<p>2、创建仓库</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">点击github右上角的加号，选择New repository,或者点击左侧Create a repository进行创建</span><br><span class="line">Repository name需要与你的用户名相同</span><br><span class="line">例如我的用户名:homraL </span><br><span class="line">那么这里我要写:homraL.github.io</span><br></pre></td></tr></table></figure>
<p><img src="http://wx3.sinaimg.cn/large/cc586804gy1g1zn76v3fhj217v0eamzx.jpg" alt="02"></p>
<p><img src="http://wx3.sinaimg.cn/large/cc586804gy1g1zn77d4glj20s60hqt9m.jpg" alt="03"></p>
<p>3、开启GitHub Pages</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">在打开的仓库页面，点击右上方的Settings按钮，在新打开的页面，向下找到GitHub Pages的部分</span><br><span class="line">可以通过Choose a theme更改主题</span><br><span class="line">可以通过上方绿色框内的地址进行访问</span><br><span class="line">例如我的地址就是: https://homral.github.io</span><br><span class="line">如果有域名可以填入Custom domain</span><br><span class="line">后面会单独讲如何与域名进行绑定，此处不做过多讨论</span><br></pre></td></tr></table></figure>

<p><img src="http://wx2.sinaimg.cn/large/cc586804gy1g1zn7a7o8fj212h0cs78i.jpg" alt="07"></p>
<p>4、搭建Hexo准备工作</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">搭建Hexo需要我们准备如下软件</span><br><span class="line">Node.js: https://nodejs.org/en/download</span><br><span class="line">Git: https://git-scm.com/download</span><br><span class="line">GitHub: https://desktop.github.com</span><br></pre></td></tr></table></figure>
<p><img src="http://wx4.sinaimg.cn/large/cc586804gy1g1zn7ap6nqj20wo0kfwft.jpg" alt="08"></p>

<p><img src="http://wx3.sinaimg.cn/large/cc586804gy1g1zn75kj7bj20x10f2t9u.jpg" alt="00"></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">现在我们从官网下载到上述三款软件</span><br><span class="line">首先配置node.js</span><br></pre></td></tr></table></figure>
<p><img src="http://wx3.sinaimg.cn/large/cc586804gy1g1zn7bwlpfj20mv01p0so.jpg" alt="10"></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">将node-v10.15.3-win-x64.zip解压到要安装的位置 并新建两个目录</span><br><span class="line">node-global:npm  全局安装位置</span><br><span class="line">node-cache:npm   缓存路径</span><br></pre></td></tr></table></figure>
<p><img src="http://wx1.sinaimg.cn/large/cc586804gy1g1zn7cfwhnj20jh08b0t4.jpg" alt="11"></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">接下来配置node相关的环境变量</span><br><span class="line">在Path中添加如下两条</span><br><span class="line">E:\Learn\Java\Software\Node</span><br><span class="line">E:\Learn\Java\Software\Node\node-global</span><br><span class="line">第一条是你的Node解压后的根路径 方便我们在任意目录下使用node命令</span><br><span class="line">第二条是我们刚新建的全局安装位置</span><br></pre></td></tr></table></figure>
<p><img src="http://wx2.sinaimg.cn/large/cc586804gy1g1zn7drh0nj218g0nyds0.jpg" alt="12"></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">接下来可以通过命令行 输入下方两条命令进行检验是否配置成功</span><br><span class="line">node -v</span><br><span class="line">npm -v</span><br><span class="line">如下显示即代表成功了</span><br></pre></td></tr></table></figure>
<p><img src="http://wx4.sinaimg.cn/large/cc586804gy1g1zn7e8vtuj20dl05fwec.jpg" alt="13"></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br></pre></td><td class="code"><pre><span class="line">接下来将node-global和node-cache与npm配置到一起</span><br><span class="line">分别运行如下两条命令 路径需要替换为你自己的路径</span><br><span class="line">npm config set prefix &quot;E:\Learn\Java\Software\Node\node-global&quot;</span><br><span class="line">npm config set cache &quot;E:\Learn\Java\Software\Node\node-cache&quot;</span><br><span class="line">-------------------------------------------------------------------</span><br><span class="line">执行成功后 在运行如下两条命令</span><br><span class="line">npm install webpack -g</span><br><span class="line">npm install -g npm</span><br><span class="line">见到如下说明成功了</span><br><span class="line">需要注意的是 这里的WARN不需要在意 因为部分功能是给MAC系统使用的</span><br><span class="line">忽略即可 只要不是ERROR就可以啦</span><br><span class="line">到这里Node.js的准备告一段落</span><br></pre></td></tr></table></figure>
<p><img src="http://wx1.sinaimg.cn/large/cc586804gy1g1zn7ertlwj20ld0aojrm.jpg" alt="14"></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line">接下来安装一下Git</span><br><span class="line">这里我们也是根据系统的位数与需要的版本进行安装</span><br><span class="line">同时也会提供ZIP免安装版与EXE安装版</span><br><span class="line">与Node不同 Git我选择了安装版</span><br><span class="line">较免安装版配置上个人觉得更方便一点</span><br><span class="line">安装过程全程一直保持默认下一步即可</span><br><span class="line">安装成功后 我们在任意文件夹内空白处点击鼠标右键</span><br><span class="line">如出现下面菜单 就说明安装成功了</span><br></pre></td></tr></table></figure>
<p><img src="http://wx2.sinaimg.cn/large/cc586804gy1g1zn7f75fsj20ox0bo0t7.jpg" alt="15"></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">接下来双击GitHubDesktopSetup.exe</span><br><span class="line">不需要你选择任何东西 甚至你都不知道安装到哪里去了</span><br><span class="line">然后它就安装完毕并自动打开了</span><br><span class="line">登录你的github账号</span><br><span class="line">将对应你用户名的仓库克隆到本地的一个目录</span><br></pre></td></tr></table></figure>
<p><img src="http://wx2.sinaimg.cn/large/cc586804gy1g1zn7fokz7j20ox0damxm.jpg" alt="16"></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">等待一下 在对应的目录下我们就能看到啦</span><br><span class="line">到这里Hexo的准备工作已经完成</span><br><span class="line">下次我们可以点击桌面上紫色的图标GitHub Desktop来启动它</span><br></pre></td></tr></table></figure>
<p><img src="http://wx2.sinaimg.cn/large/cc586804gy1g1zn7g81x4j20hh06774b.jpg" alt="17"></p>
<p>5、搭建Hexo开始</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line">我们可以先创建一个Hexo文件夹(名字随意 下文中myblog同样）</span><br><span class="line">进入到文件夹后 右键选择Git Bash Here</span><br><span class="line">依次输入下方四条命令</span><br><span class="line">npm install -g hexo-cli</span><br><span class="line">hexo init myblog</span><br><span class="line">cd myblog</span><br><span class="line">npm install</span><br></pre></td></tr></table></figure>
<p><img src="http://wx1.sinaimg.cn/large/cc586804gy1g1zn7h3th1j20v708waau.jpg" alt="19"></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">生成静态文件：hexo g</span><br><span class="line">启动服务器：hexo s</span><br><span class="line">注意：这里会有一个弹框 记得允许访问</span><br><span class="line">上述两条命令后 我们就可以访问啦</span><br></pre></td></tr></table></figure>
<p><img src="http://wx4.sinaimg.cn/large/cc586804gy1g1zn7hh0h0j20gq04fwej.jpg" alt="20"></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">默认情况下 访问网址为：http://localhost:4000</span><br></pre></td></tr></table></figure>
<p><img src="http://wx4.sinaimg.cn/large/cc586804gy1g1zn7it0chj210j0e6k19.jpg" alt="21"></p>
<p>6、如何创建一篇新文章</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br></pre></td><td class="code"><pre><span class="line">首先我们使用CTRL + C可以关掉服务</span><br><span class="line">新建文章：hexo new &quot;文章名&quot;</span><br><span class="line">之后会在Hexo\myblog\source\_posts下创建一个md文件</span><br><span class="line">我们可以复制该文件 修改标题或者文件名</span><br><span class="line">然后重新使用</span><br><span class="line">hexo g</span><br><span class="line">hexo s</span><br><span class="line">刷新http://localhost:4000就能看到了</span><br></pre></td></tr></table></figure>
<p>7、更换Hexo的主题</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">打开Hexo官方主题页：https://hexo.io/themes</span><br><span class="line">挑选自己喜欢的主题</span><br><span class="line">这里楼主选择的是MiccallTheme</span><br></pre></td></tr></table></figure>
<p><img src="http://wx2.sinaimg.cn/large/cc586804gy1g1zn7k4c1ij20n50b7140.jpg" alt="22"></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br></pre></td><td class="code"><pre><span class="line">首先进入theme文件夹下 右键选择Git Bash Here</span><br><span class="line">或者通过cd命令进入该文件夹</span><br><span class="line">然后将打开的主题github路径复制下来 请自行替换下方路径</span><br><span class="line">git clone https://github.com/miccall/hexo-theme-Mic_Theme</span><br><span class="line">之后我们就可以在themes下看到下载好的主题文件</span><br><span class="line">可以将名字改的短一点 方便使用</span><br></pre></td></tr></table></figure>
<p><img src="http://wx3.sinaimg.cn/large/cc586804gy1g1zn7kh4jdj20f701wdfn.jpg" alt="23"></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">然后打开Hexo的配置文件</span><br><span class="line">翻到最后找到theme属性</span><br><span class="line">将默认主题修改为你刚刚下载的文件夹名称</span><br><span class="line">这里我改成了Miccall</span><br></pre></td></tr></table></figure>
<p><img src="http://wx4.sinaimg.cn/large/cc586804gy1g1zn7kxp97j20p20avmxt.jpg" alt="24"></p>

<p>8、生成SSH密钥添加到GitHub</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br></pre></td><td class="code"><pre><span class="line">只有配置好SSH密钥后 我们才可以通过git操作实现本地代码库与Github代码库同步</span><br><span class="line">在myblog文件夹下输入命令</span><br><span class="line">git config --global user.name &quot;yourname&quot;</span><br><span class="line">git config --global user.email &quot;youremail&quot;</span><br><span class="line">ssh-keygen -t rsa -C &quot;youremail&quot;</span><br><span class="line">yourname输入你的GitHub用户名</span><br><span class="line">youremail输入你GitHub的邮箱</span><br><span class="line">之后一直回车即可</span><br><span class="line">可在用户名文件夹下生成key</span><br><span class="line">C:\Users\用户名\.ssh</span><br></pre></td></tr></table></figure>
<p><img src="http://wx1.sinaimg.cn/large/cc586804gy1g1zn7oi8jgj20lo07zmxa.jpg" alt="27"></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br></pre></td><td class="code"><pre><span class="line">id_rsa是你这台电脑的私人秘钥 不能给别人看的</span><br><span class="line">id_rsa.pub是公共秘钥 可以随便给别人看</span><br><span class="line">我们要把公钥放在GitHub上 这样当你链接GitHub自己的账户时</span><br><span class="line">它就会根据公钥匹配你的私钥 当能够相互匹配时</span><br><span class="line">才能够顺利的通过git上传你的文件到GitHub上</span><br><span class="line">我们打开github官网</span><br><span class="line">找到右上角头像下的settings</span><br><span class="line">选择SSH and GPG keys</span><br><span class="line">点击New SSH key创建新的SSHkey</span><br></pre></td></tr></table></figure>
<p><img src="http://wx3.sinaimg.cn/large/cc586804gy1g1zn7oxmtdj211g0cugmm.jpg" alt="28"></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">在新弹出的页面中</span><br><span class="line">随便输如一个title名字</span><br><span class="line">将id_rsa.pub文件中的内容全选复制到下方框内</span><br><span class="line">点击add ssh key</span><br><span class="line">之后会让你输入一次github的密码进行确认</span><br></pre></td></tr></table></figure>
<p><img src="http://wx4.sinaimg.cn/large/cc586804gy1g1zn7q7bu1j20qu0bzt8v.jpg" alt="29"></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br></pre></td><td class="code"><pre><span class="line">之后打开Hexo的配置文件</span><br><span class="line">拉到最下面 将内容修改为如下</span><br><span class="line">homraL替换成你自己的github名字</span><br><span class="line">deploy:</span><br><span class="line">  type: git</span><br><span class="line">  repository: git@github.com:homraL/homraL.github.io.git</span><br><span class="line">  branch: master</span><br></pre></td></tr></table></figure>
<p><img src="http://wx1.sinaimg.cn/large/cc586804gy1g1zn7qlzbaj20lj04tweg.jpg" alt="30"></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">仓库地址可以在你的github仓库主页找到</span><br><span class="line">点击Clone or download</span><br><span class="line">因为我们选用的是SSH方式 所以选择use SSH</span><br><span class="line">然后复制下方地址到repository后面即可</span><br><span class="line">注意：每一个属性后面的空格不可删掉</span><br></pre></td></tr></table></figure>
<p><img src="http://wx1.sinaimg.cn/large/cc586804gy1g1zn7qzi3ij20sz0a83z8.jpg" alt="31"></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br></pre></td><td class="code"><pre><span class="line">在git中输入命令安装deploy-git</span><br><span class="line">这样我们才能用命令部署到GitHub</span><br><span class="line">npm install hexo-deployer-git --save</span><br><span class="line">接下来我们重新部署一下即可</span><br><span class="line">hexo clean 清除了你之前生成的东西 也可以不加</span><br><span class="line">hexo generate 生成静态文章 可以用hexo g缩写</span><br><span class="line">hexo deploy 部署文章 可以用hexo d缩写</span><br><span class="line"></span><br><span class="line">注意：deploy时可能要你输入username和password</span><br><span class="line">这个时候 我们再次访问https://homral.github.io</span><br><span class="line">就可以看到更换成hexo了</span><br></pre></td></tr></table></figure>
<p><img src="http://wx2.sinaimg.cn/large/cc586804gy1g1zn7rgu84j20g302gq2t.jpg" alt="32"></p>
<p>9、绑定个人域名(非必须内容)</p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br></pre></td><td class="code"><pre><span class="line">现在我们已经可以通过homral.github.io访问了</span><br><span class="line">但是看起来不够&quot;厉害&quot;</span><br><span class="line">所以我们可以买一个自己的域名绑定到上面</span><br><span class="line">楼主是在阿里云买的域名 https://wanwang.aliyun.com</span><br></pre></td></tr></table></figure>
<p><img src="http://wx2.sinaimg.cn/large/cc586804gy1g1zn7teqcoj21340i2qmn.jpg" alt="33"></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br></pre></td><td class="code"><pre><span class="line">好了 到这一步假装我们有了一个域名</span><br><span class="line">就假装是楼主的那个吧</span><br><span class="line">homra.cn</span><br><span class="line">然后我们打开 https://dc.console.aliyun.com/next/#/domain/list/all-domain</span><br><span class="line">找到域名右侧的解析按钮</span><br></pre></td></tr></table></figure>
<p><img src="http://wx4.sinaimg.cn/large/cc586804gy1g1zn7tzl8yj210b02ymx3.jpg" alt="34"></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br></pre></td><td class="code"><pre><span class="line">点击添加纪录 按照楼主的记录创建两条记录</span><br></pre></td></tr></table></figure>
<p><img src="http://wx2.sinaimg.cn/large/cc586804gy1g1zn7voqgyj211907iglw.jpg" alt="35"></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br></pre></td><td class="code"><pre><span class="line">然后我们打开github 找到最开始说的Custom domain</span><br><span class="line">将申请好的域名填写到这里</span><br></pre></td></tr></table></figure>
<p><img src="http://wx1.sinaimg.cn/large/cc586804gy1g1zn7w6vbxj20k407h0sv.jpg" alt="36"></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br></pre></td><td class="code"><pre><span class="line">然后打开博客的source目录</span><br><span class="line">创建一个无后缀名的CNAME文件</span><br><span class="line">里面输入你的域名</span><br></pre></td></tr></table></figure>
<p><img src="http://wx3.sinaimg.cn/large/cc586804gy1g1zn7wvm70j20qz0bb75d.jpg" alt="37"></p>
<figure class="highlight plain"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br></pre></td><td class="code"><pre><span class="line">最后在你懂得</span><br><span class="line">hexo clean</span><br><span class="line">hexo g</span><br><span class="line">hexo d</span><br><span class="line">------------------------------</span><br><span class="line">很久很久之后</span><br><span class="line">如果不能访问不要着急</span><br><span class="line">因为需要解析的</span><br><span class="line">几分钟到几小时不等</span><br><span class="line">最终你发现你的域名终于可以访问了</span><br><span class="line">------------------------------</span><br><span class="line">如果更换了新电脑 该怎么继续写博客呢？</span><br><span class="line">只需要备份Hexo下的这些文件即可</span><br><span class="line">_config.yml</span><br><span class="line">package.json</span><br><span class="line">scaffolds目录</span><br><span class="line">source目录</span><br><span class="line">themes目录</span><br><span class="line">之后覆盖到新电脑中的相同位置</span><br><span class="line">最后执行上方三条命令重新生成发布即可</span><br><span class="line"></span><br><span class="line">本文写于2019年4月11日 上海</span><br><span class="line">转载请注明出处</span><br></pre></td></tr></table></figure>
